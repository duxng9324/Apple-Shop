services:
  mysql:
    image: mysql:8.0
    container_name: appleshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: store
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Apple-Shop-BE
    container_name: appleshop-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8081:8081"

  redis:
    image: redis:7-alpine
    container_name: appleshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama
    container_name: appleshop-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  ollama-init:
    image: ollama/ollama
    container_name: appleshop-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2"]
    restart: "no"

  chatbot:
    build:
      context: ./chat-bot-be
    container_name: appleshop-chatbot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: llama3.2
      JAVA_BACKEND_BASE: http://backend:8081
      FRONTEND_BASE_URL: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./appleshop-ui
    container_name: appleshop-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      chatbot:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  mysql_data:
  redis_data:
  ollama_data:
